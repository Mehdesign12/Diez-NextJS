<!DOCTYPE html>
<html lang="fr">
<head>
    <meta charset="UTF-8">
    <meta name="viewport" content="width=device-width, initial-scale=1.0, maximum-scale=1.0, user-scalable=no">
    <title>Article | Diez Agency</title>
    <script src="https://cdn.tailwindcss.com"></script>
    <link rel="preconnect" href="https://fonts.googleapis.com">
    <link rel="preconnect" href="https://fonts.gstatic.com" crossorigin>
    <link href="https://fonts.googleapis.com/css2?family=Plus+Jakarta+Sans:wght@300;400;500;600;700;800&display=swap" rel="stylesheet">
    <link rel="stylesheet" href="https://cdnjs.cloudflare.com/ajax/libs/font-awesome/6.4.0/css/all.min.css">
    <script src="https://cdn.jsdelivr.net/gh/studio-freight/lenis@1.0.29/bundled/lenis.min.js"></script>
    <!-- Supabase JS -->
    <script src="https://cdn.jsdelivr.net/npm/@supabase/supabase-js@2"></script>
    <script>
        // Initialize Supabase
        const supabaseUrl = 'https://qegewzvyjiijozioqsgq.supabase.co'
        const supabaseKey = 'eyJhbGciOiJIUzI1NiIsInR5cCI6IkpXVCJ9.eyJpc3MiOiJzdXBhYmFzZSIsInJlZiI6InFlZ2V3enZ5amlpam96aW9xc2dxIiwicm9sZSI6ImFub24iLCJpYXQiOjE3NjQxODExNTMsImV4cCI6MjA3OTc1NzE1M30.2Q84Q6aTfU--ShAa4VzRgEmzzkhdTFb6TZD73mqaar0'
        const supabaseClient = window.supabase.createClient(supabaseUrl, supabaseKey)

        tailwind.config = {
            theme: {
                extend: {
                    fontFamily: { sans: ['"Plus Jakarta Sans"', 'sans-serif'] },
                    colors: {
                        diez: {
                            base: '#FFF8F3',
                            orange: '#FF4D29',
                            dark: '#0F0F0F',
                            gray: '#F4F4F5'
                        }
                    }
                }
            }
        }
    </script>
    <style>
        html, body { width: 100%; max-width: 100vw; overflow-x: hidden; }
        body { background-color: #FFF8F3; color: #0F0F0F; }
        /* Typography for Blog Content */
        .prose h2 { font-size: 1.8rem; font-weight: 700; margin-top: 2rem; margin-bottom: 1rem; color: #0F0F0F; }
        .prose h3 { font-size: 1.4rem; font-weight: 600; margin-top: 1.5rem; margin-bottom: 0.75rem; color: #0F0F0F; }
        .prose p { margin-bottom: 1.25rem; line-height: 1.8; color: #4B5563; font-size: 1.1rem; }
        .prose ul { list-style-type: disc; padding-left: 1.5rem; margin-bottom: 1.25rem; }
        .prose li { margin-bottom: 0.5rem; color: #4B5563; }
        .prose strong { color: #0F0F0F; font-weight: 700; }
    </style>
</head>
<body class="antialiased">

    <!-- Navigation -->
    <div class="fixed w-full z-50 top-6 transition-all duration-300">
        <nav class="relative z-50 mx-4 md:mx-auto max-w-5xl px-4 py-3 bg-white/90 backdrop-blur-md border border-gray-100 shadow-lg rounded-full flex justify-between items-center">
            <a href="blog.html" class="flex items-center gap-2 text-gray-600 hover:text-diez-orange transition-colors font-medium">
                <i class="fas fa-arrow-left"></i> Retour au blog
            </a>
            <a href="index.html" class="w-10 h-10 rounded-full overflow-hidden">
                <img src="images/logo_clean.png" alt="Diez Logo" class="w-full h-full object-cover">
            </a>
        </nav>
    </div>

    <!-- Article Content -->
    <article id="article-container" class="min-h-screen pt-32 pb-20">
        <!-- Loading -->
        <div class="text-center py-20">
            <div class="inline-block w-8 h-8 border-4 border-diez-orange border-t-transparent rounded-full animate-spin"></div>
        </div>
    </article>

    <!-- Footer -->
    <footer class="bg-diez-dark text-white py-12 text-center">
        <p class="text-gray-500 text-sm">© 2025 Diez Agency.</p>
    </footer>

    <!-- Back to Top Button -->
    <button id="back-to-top" onclick="lenis.scrollTo(0)" class="fixed bottom-6 right-6 z-40 w-12 h-12 bg-diez-orange text-white rounded-full shadow-lg shadow-diez-orange/40 flex items-center justify-center transition-all duration-300 opacity-0 translate-y-10 pointer-events-none hover:scale-110 hover:shadow-diez-orange/60 active:scale-95">
        <i class="fas fa-arrow-up text-lg"></i>
    </button>

    <script>
        // Smooth Scroll
        const lenis = new Lenis({ duration: 1.2, smooth: true });
        function raf(time) { lenis.raf(time); requestAnimationFrame(raf); }
        requestAnimationFrame(raf);

        // Back to Top Logic
        const backToTop = document.getElementById('back-to-top');
        window.addEventListener('scroll', () => {
            if (window.scrollY > 500) {
                backToTop.classList.remove('opacity-0', 'translate-y-10', 'pointer-events-none');
            } else {
                backToTop.classList.add('opacity-0', 'translate-y-10', 'pointer-events-none');
            }
        });

        // Fetch Article from Supabase
        async function loadArticle() {
            const urlParams = new URLSearchParams(window.location.search);
            const id = urlParams.get('id');

            if (!id) {
                window.location.href = 'blog.html';
                return;
            }

            try {
                const { data: post, error } = await supabaseClient
                    .from('posts')
                    .select('*')
                    .eq('id', id)
                    .single();

                if (error) throw error;

                const container = document.getElementById('article-container');

                document.title = `${post.title} | Diez Agency`;

                container.innerHTML = `
                    <div class="max-w-4xl mx-auto px-4">
                        <!-- Header -->
                        <div class="text-center mb-12">
                            <div class="inline-block px-3 py-1 rounded-full bg-orange-100 text-diez-orange text-xs font-bold uppercase tracking-wide mb-6">
                                ${post.category || 'Article'}
                            </div>
                            <h1 class="text-3xl md:text-5xl font-extrabold text-diez-dark mb-6 leading-tight">
                                ${post.title}
                            </h1>
                            <div class="text-gray-500">
                                Publié le ${new Date(post.published_at).toLocaleDateString('fr-FR', {day: 'numeric', month: 'long', year: 'numeric'})}
                            </div>
                        </div>

                        <!-- Featured Image -->
                        <div class="rounded-3xl overflow-hidden shadow-xl mb-16 aspect-[16/9]">
                            <img src="${post.image_url}" alt="${post.title}" class="w-full h-full object-cover">
                        </div>

                        <!-- Content Body -->
                        <div class="prose max-w-2xl mx-auto">
                            ${post.content}
                        </div>
                    </div>
                `;

            } catch (error) {
                console.error('Error:', error);
                document.getElementById('article-container').innerHTML = '<div class="text-center text-red-500 pt-20">Article introuvable ou erreur de connexion.</div>';
            }
        }

        loadArticle();
    </script>
</body>
</html>
